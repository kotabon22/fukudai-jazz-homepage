# =====================================================
# Decap CMS 設定ファイル
# =====================================================
# ▼ 必ず書き換える箇所
#   backend.repo        : GitHubユーザー名/リポジトリ名
#   media_library.config: Cloudinaryのcloud_name / api_key
# =====================================================

backend:
  name: git-gateway # Netlify Identity + Git Gateway を使う
  branch: main # デプロイ対象ブランチ

# ---------- 公開設定 ----------
publish_mode: editorial_workflow # 下書き → レビュー → 公開 の3ステップ
# publish_mode を simple にすると「保存=即公開」になる（後輩向けに楽）

# ---------- Cloudinary 画像管理 ----------
media_library:
  name: cloudinary
  config:
    cloud_name: dsenxdetu # ← Cloudinaryダッシュボードで確認
    api_key: 214349632659917 # ← Cloudinaryダッシュボードで確認
    # api_secret はフロントに書かない（Netlify環境変数に入れる）

# ---------- サイト URL ----------
site_url: https://scam-hazard-sprang-suggest-unfitting.netlify.app
display_url: https://scam-hazard-sprang-suggest-unfitting.netlify.app

# =====================================================
# コレクション定義
# =====================================================
collections:
  # ── 活動報告（記事）──────────────────────────────
  - name: posts
    label: 活動報告
    label_singular: 記事
    folder: _posts
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    preview_path: "posts/{{slug}}"
    fields:
      - label: タイトル
        name: title
        widget: string
        hint: "例：学祭ライブ2025 大盛況！"

      - label: 公開日
        name: date
        widget: datetime
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false

      - label: 絵文字アイコン
        name: emoji
        widget: string
        default: "🎵"
        hint: "記事カードに表示されるアイコン"

      - label: タグ
        name: tags
        widget: list
        allow_add: true
        hint: "ライブ、練習、合宿 など"

      - label: 下書き
        name: draft
        widget: boolean
        default: false

      - label: アイキャッチ画像
        name: image
        widget: image
        required: false
        hint: "記事カードのメイン画像（Cloudinaryにアップロード）"
        media_library:
          config:
            multiple: false

      - label: ギャラリー（最大10枚）
        name: gallery
        widget: list
        max: 10
        field:
          label: 画像
          name: image
          widget: image
          media_library:
            config:
              multiple: false
        hint: "記事内に表示されるフォトギャラリー（最大10枚）"

      - label: 本文
        name: body
        widget: markdown
        hint: "# が大見出し、## が中見出し。画像は上のギャラリーから挿入できます"

  # ── アルバム ────────────────────────────────────
  - name: album
    label: フォトアルバム
    label_singular: アルバム
    folder: _album
    create: true
    slug: "{{slug}}"
    fields:
      - label: アルバムタイトル
        name: title
        widget: string

      - label: キャプション
        name: caption
        widget: string
        required: false

      - label: 日付
        name: date
        widget: datetime
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false

      - label: 写真（最大20枚）
        name: images
        widget: list
        max: 20
        field:
          label: 画像
          name: image
          widget: image
          media_library:
            config:
              multiple: false

  # ── サイト全体設定 ──────────────────────────────
  - name: settings
    label: サイト設定
    files:
      - label: 基本情報
        name: general
        file: _data/general.json
        fields:
          - { label: サークル名, name: club_name, widget: string }
          - { label: 英語名, name: club_name_en, widget: string }
          - { label: 創設年, name: established, widget: string }
          - { label: メンバー数表示, name: member_count, widget: string }
          - { label: 年間ライブ数表示, name: live_count, widget: string }
          - { label: 活動年数表示, name: years, widget: string }
          - { label: 入部フォームURL, name: form_url, widget: string }

      - label: メンバー
        name: members
        file: _data/members.json
        fields:
          - label: メンバー一覧
            name: members
            widget: list
            fields:
              - { label: 名前, name: name, widget: string }
              - { label: 役職(英), name: role, widget: string, default: Member }
              - {
                  label: 役職(日),
                  name: role_jp,
                  widget: string,
                  required: false,
                }
              - { label: 楽器, name: instrument, widget: string }
              - { label: 学年, name: year, widget: string }
              - { label: 絵文字, name: emoji, widget: string, default: "🎵" }

      - label: 活動スケジュール
        name: schedule
        file: _data/schedule.json
        fields:
          - label: スケジュール一覧
            name: schedule
            widget: list
            fields:
              - { label: 時期ラベル, name: day, widget: string }
              - { label: イベント名, name: title, widget: string }
              - { label: アイコン, name: icon, widget: string, default: "🎵" }
              - { label: 日時詳細, name: detail, widget: string }
              - { label: 場所, name: place, widget: string }

      - label: リンクツリー
        name: links
        file: _data/links.json
        fields:
          - label: リンク一覧
            name: links
            widget: list
            fields:
              - { label: ラベル, name: label, widget: string }
              - { label: URL, name: url, widget: string }
              - { label: アイコン, name: icon, widget: string, default: "🔗" }
              - {
                  label: カラー,
                  name: color,
                  widget: color,
                  default: "#c9962a",
                }

      - label: セクション順序・表示設定
        name: sections
        file: _data/sections.json
        fields:
          - label: セクション一覧（ドラッグで並び替え可）
            name: sections
            widget: list
            fields:
              - { label: セクションID, name: id, widget: string }
              - {
                  label: 種類,
                  name: type,
                  widget: select,
                  options:
                    [
                      about,
                      schedule,
                      reports,
                      album,
                      members,
                      links,
                      join,
                      custom,
                    ],
                }
              - { label: ナビラベル, name: label, widget: string }
              - {
                  label: 表示する,
                  name: enabled,
                  widget: boolean,
                  default: true,
                }
              - {
                  label: カスタム本文,
                  name: content,
                  widget: markdown,
                  required: false,
                  hint: "type=custom のときのみ使用",
                }
